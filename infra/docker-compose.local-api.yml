# Run only API + bot locally, connecting to a remote Postgres (e.g. via SSH tunnel).
# Usage: docker compose -f docker-compose.yml -f docker-compose.local-api.yml up -d api
# Before running: ssh -L 15432:localhost:5432 user@VPS_IP -N
# In .env: POSTGRES_HOST=host.docker.internal POSTGRES_PORT=15432

services:
  api:
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-host.docker.internal}
      - POSTGRES_PORT=${POSTGRES_PORT:-15432}
    depends_on: []

  bot:
    depends_on:
      - api
