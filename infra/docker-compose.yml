services:
  # ── Infrastructure ────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: tutorbot_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tutorbot}
      POSTGRES_USER: ${POSTGRES_USER:-tutorbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tutorbot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tutorbot} -d ${POSTGRES_DB:-tutorbot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Application ───────────────────────────────────

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: tutorbot_api
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build:
      context: ../apps/bot
      dockerfile: Dockerfile
    container_name: tutorbot_bot
    env_file:
      - .env
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  tma:
    build:
      context: ../apps/tma
      dockerfile: Dockerfile
    container_name: tutorbot_tma
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  pgdata:
