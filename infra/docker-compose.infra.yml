# Infrastructure only (no app builds).
# Usage: docker compose -f docker-compose.infra.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: tutorbot_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tutorbot}
      POSTGRES_USER: ${POSTGRES_USER:-tutorbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tutorbot}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tutorbot} -d ${POSTGRES_DB:-tutorbot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
